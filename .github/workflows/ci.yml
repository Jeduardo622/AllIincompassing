name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate session edge deploy prerequisites
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          missing=()
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            missing+=("SUPABASE_ACCESS_TOKEN")
          fi
          if [ -z "${SUPABASE_URL:-}" ] && [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            missing+=("SUPABASE_URL or SUPABASE_PROJECT_REF")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required secrets for session edge deploy: ${missing[*]}"
            exit 1
          fi

      - name: Deploy required session edge functions (push + pull_request)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run ci:deploy:session-edge-bundle

      - name: Validate secrets policy
        run: npm run ci:secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ORGANIZATION: ${{ secrets.OPENAI_ORGANIZATION }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TEST_JWT_ORG_A: ${{ secrets.TEST_JWT_ORG_A }}
          TEST_JWT_ORG_B: ${{ secrets.TEST_JWT_ORG_B }}
          TEST_JWT_SUPER_ADMIN: ${{ secrets.TEST_JWT_SUPER_ADMIN }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_STAGING_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}
          NETLIFY_PRODUCTION_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

      - name: Policy checks
        run: npm run ci:check-focused
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CI_PROTECTED_BRANCHES: "main"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CI_SUPABASE_AUTH_PARITY_REQUIRED: "true"
          CI_EDGE_ROUTE_PARITY_REQUIRED: "true"
          SUPABASE_FUNCTION_PARITY_SCOPE: "sessions-book,sessions-hold,sessions-confirm,sessions-start,sessions-cancel,generate-session-notes-pdf,session-notes-pdf-status,session-notes-pdf-download"
          CI_RLS_OVERLAP_REQUIRED: ${{ secrets.SUPABASE_DB_URL != '' && 'true' || 'false' }}
          CI_REQUIRED_CHECKS: "policy,lint-typecheck,unit-tests,build,tier0-browser,auth-browser-smoke"
          API_AUTHORITY_MODE: "edge"
          RATE_LIMIT_MODE: "memory"

  lint_typecheck:
    name: lint-typecheck
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  unit_tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests + coverage
        run: npm run test:ci
        env:
          # Required for CI-only Supabase security/integration suites.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify coverage thresholds
        run: npm run ci:verify-coverage

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint_typecheck, unit_tests]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build canary
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist
          if-no-files-found: error

  tier0_browser:
    name: tier0-browser
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: artifact-dist

      - name: Normalize dist artifact path
        run: |
          rm -rf dist
          if [ -f "artifact-dist/index.html" ]; then
            mkdir -p dist
            cp -R artifact-dist/. dist/
          elif [ -f "artifact-dist/dist/index.html" ]; then
            mkdir -p dist
            cp -R artifact-dist/dist/. dist/
          else
            echo "dist artifact layout did not contain index.html"
            echo "artifact-dist contents:"
            ls -la artifact-dist || true
            echo "artifact-dist/dist contents:"
            ls -la artifact-dist/dist || true
            exit 1
          fi
          test -f "dist/index.html"

      - name: Tier-0 browser regression gate
        run: npm run test:routes:tier0
        env:
          PREVIEW_OUTPUT_DIR: dist

      - name: Record tier-0 evidence
        if: always()
        run: npm run ci:write-evidence -- tier0-browser "${{ job.status }}"

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cypress-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            cypress/screenshots
            cypress/videos
            artifacts/latest
          if-no-files-found: ignore

  auth_browser_smoke:
    name: auth-browser-smoke
    runs-on: ubuntu-latest
    needs: policy
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy required session edge functions (push only)
        if: github.event_name == 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run ci:deploy:session-edge-bundle

      - name: Auth browser smoke gate
        env:
          PW_BASE_URL: ${{ secrets.PW_BASE_URL }}
          PW_ADMIN_EMAIL: ${{ secrets.PW_ADMIN_EMAIL }}
          PW_ADMIN_PASSWORD: ${{ secrets.PW_ADMIN_PASSWORD }}
          PW_THERAPIST_EMAIL: ${{ secrets.PW_THERAPIST_EMAIL }}
          PW_THERAPIST_PASSWORD: ${{ secrets.PW_THERAPIST_PASSWORD }}
          PW_FOREIGN_CLIENT_ID: ${{ secrets.PW_FOREIGN_CLIENT_ID }}
          PW_FOREIGN_THERAPIST_ID: ${{ secrets.PW_FOREIGN_THERAPIST_ID }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          required=(
            PW_BASE_URL
            PW_ADMIN_EMAIL
            PW_ADMIN_PASSWORD
            PW_THERAPIST_EMAIL
            PW_THERAPIST_PASSWORD
            PW_FOREIGN_CLIENT_ID
            PW_FOREIGN_THERAPIST_ID
            VITE_SUPABASE_URL
            VITE_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              echo "::warning::Missing auth smoke secrets on pull_request; skipping browser smoke gate: ${missing[*]}"
              exit 0
            fi
            echo "Missing required secrets for auth browser smoke gate: ${missing[*]}"
            exit 1
          fi
          export CI_SESSION_PARITY_REQUIRED=true
          npm run playwright:preflight && npm run playwright:auth && npm run playwright:session-lifecycle

      - name: Record auth smoke evidence
        if: always()
        run: npm run ci:write-evidence -- auth-browser-smoke "${{ job.status }}"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/latest
          if-no-files-found: ignore
