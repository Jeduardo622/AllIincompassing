name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ORGANIZATION: ${{ secrets.OPENAI_ORGANIZATION }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      TEST_JWT_ORG_A: ${{ secrets.TEST_JWT_ORG_A }}
      TEST_JWT_ORG_B: ${{ secrets.TEST_JWT_ORG_B }}
      TEST_JWT_SUPER_ADMIN: ${{ secrets.TEST_JWT_SUPER_ADMIN }}
      CLEARINGHOUSE_SANDBOX_API_KEY: ${{ secrets.CLEARINGHOUSE_SANDBOX_API_KEY }}
      CLEARINGHOUSE_SANDBOX_CLIENT_ID: ${{ secrets.CLEARINGHOUSE_SANDBOX_CLIENT_ID }}
      TELEMETRY_WRITE_KEY: ${{ secrets.TELEMETRY_WRITE_KEY }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_STAGING_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}
      NETLIFY_PRODUCTION_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate secrets policy
        run: npm run ci:secrets

      - name: Policy checks
        run: npm run ci:check-focused

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:ci

      - name: Verify coverage thresholds
        run: npm run ci:verify-coverage

      - name: Build canary
        run: npm run build

      - name: Tier-0 browser regression gate
        run: npm run test:routes:tier0
        env:
          PREVIEW_OUTPUT_DIR: dist

      - name: Auth browser smoke gate
        run: npm run playwright:preflight && npm run playwright:auth
