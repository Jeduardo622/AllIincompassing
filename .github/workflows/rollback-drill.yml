name: Rollback Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

permissions:
  contents: read

jobs:
  rollback-drill:
    name: rollback-drill
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rollback drill contract checks
        run: npm run ci:rollback-drill

      - name: Record rollback drill evidence
        if: always()
        run: npm run ci:write-evidence -- rollback-drill "${{ job.status }}"

      - name: Upload rollback drill artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rollback-drill-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/latest
          if-no-files-found: ignore
