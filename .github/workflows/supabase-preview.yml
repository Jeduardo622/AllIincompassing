name: Supabase Preview
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/commit to preview"
        required: false
        default: feat/rls-rollout-mcp

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
      - name: Start local Supabase (ephemeral)
        run: |
          supabase start | sed -e 's/\(anon key\|service_role key\):.*/\1: <redacted>/'
      - name: Apply migrations
        run: supabase db reset --local --yes
      - name: Generate DB types (optional)
        if: ${{ vars.SUPABASE_PROJECT_ID != '' }}
        run: supabase gen types typescript --project-id $SUPABASE_PROJECT_ID > src/lib/db.types.ts
        env:
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      - name: Output local URLs
        run: |
          supabase status
          echo "Preview DB ready (local run). Use with local dev only."
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build preview bundle
        run: npm run preview:build
      - name: Run preview smoke suite
        run: npm run preview:smoke
      - name: Record preview workflow evidence
        if: always()
        run: npm run ci:write-evidence -- supabase-preview "${{ job.status }}"
      - name: Upload preview artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supabase-preview-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/latest
            reports
          if-no-files-found: ignore
