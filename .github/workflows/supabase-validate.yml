name: Supabase Validate

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-validate.yml'
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  lint-migrations:
    if: github.event_name == 'pull_request'
    name: Lint migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Supabase migration lint
        run: |
          if [ -n "$SUPABASE_PROJECT_REF" ]; then
            supabase db lint --project-ref "$SUPABASE_PROJECT_REF"
          else
            echo "SUPABASE_PROJECT_REF is not configured; using local lint fallback."
            supabase db lint
          fi
      - name: Record migration lint evidence
        if: always()
        run: npm run ci:write-evidence -- supabase-migration-lint "${{ job.status }}"
      - name: Upload migration lint artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supabase-migration-lint-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/latest
          if-no-files-found: ignore

  test-main:
    if: github.event_name == 'push'
    name: Run application tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test -- --run --reporter=verbose
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_DB_IT: '1'
      - name: Record Supabase validate evidence
        if: always()
        run: npm run ci:write-evidence -- supabase-validate-tests "${{ job.status }}"
      - name: Upload Supabase validate artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supabase-validate-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/latest
          if-no-files-found: ignore
